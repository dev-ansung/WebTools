<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Image Renderer</title>
    <style>
        :root {
            --primary-color: #10b981;
            /* Green theme for 'Success/Rendering' */
            --bg-color: #f4f4f9;
            --text-main: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .card {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            font-size: 12px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #output-container {
            display: none;
            flex-direction: column;
            gap: 15px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 5px;
        }

        .img-wrapper {
            background: #eee;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%),
                linear-gradient(-45deg, #ddd 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ddd 75%),
                linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
        }

        #render-preview {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
        }

        .meta-item {
            background: #f8fafc;
            padding: 8px;
            border-radius: 4px;
        }

        .label {
            font-weight: bold;
            color: #64748b;
            display: block;
        }

        .error {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Base64 to Image</h2>
        <p style="color: #666; font-size: 0.9rem;">Paste your Base64 string below to render the preview.</p>

        <textarea id="base64-input" placeholder="Paste data:image/... or raw base64 here"></textarea>

        <div id="error-msg" class="error">Invalid Base64 string. Please check the format.</div>

        <div id="output-container">
            <div class="meta-grid">
                <div class="meta-item"><span class="label">Dimensions</span><span id="meta-dim">-</span></div>
                <div class="meta-item"><span class="label">Format</span><span id="meta-type">-</span></div>
            </div>

            <div class="img-wrapper">
                <img id="render-preview" src="" alt="Base64 Preview">
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('base64-input');
        const container = document.getElementById('output-container');
        const preview = document.getElementById('render-preview');
        const errorMsg = document.getElementById('error-msg');

        const metaDim = document.getElementById('meta-dim');
        const metaType = document.getElementById('meta-type');

        input.addEventListener('input', () => {
            let value = input.value.trim();
            if (!value) {
                container.style.display = 'none';
                errorMsg.style.display = 'none';
                return;
            }

            // Logic to handle raw base64 by adding a default JPEG prefix if missing
            if (!value.startsWith('data:image/')) {
                value = 'data:image/jpeg;base64,' + value;
            }

            const img = new Image();
            img.onload = () => {
                errorMsg.style.display = 'none';
                container.style.display = 'flex';
                preview.src = value;

                // Update Metadata
                metaDim.innerText = `${img.width} x ${img.height} px`;
                const match = value.match(/^data:image\/([a-zA-Z+]+);base64,/);
                metaType.innerText = match ? match[1].toUpperCase() : 'Unknown';
            };

            img.onerror = () => {
                container.style.display = 'none';
                errorMsg.style.display = 'block';
            };

            img.src = value;
        });
    </script>
</body>

</html>
